apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-translator-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx  # ודאי שהשורה הזו קיימת או מושכת מה-Values
  rules:
  - host: app-translator.local
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific  # ◄ התיקון כאן
        backend:
          service:
            name: backend-service
            port:
              number: 3001
      - path: /(.*)
        pathType: ImplementationSpecific  # ◄ והתיקון כאן
        backend:
          service:
            name: frontend-service
            port:
              number: 80