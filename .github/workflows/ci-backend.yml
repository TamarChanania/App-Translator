name: CI Backend

on:
  push:
    branches: [main, ci/cd]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run unit tests
        working-directory: ./backend
        run: npm test

      - name: Test summary
        run: echo "Unit tests passed!"
        build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: tamar746968/app-translator-backend:${{ github.sha }}
          load: true

      - name: Test Docker image
        run: |
          docker run --rm tamar746968/app-translator-backend:${{ github.sha }} node --version
          echo "Docker image works!"
