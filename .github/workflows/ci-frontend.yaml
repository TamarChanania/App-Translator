name: ci-frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::048408301771:role/github-actions-s3-role
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend s3://app-translator-frontend-048408301771-eu-north-1-an \
            --delete \
            --exclude "Dockerfile" \
            --exclude "nginx.conf"

      - name: Print website URL
        run: |
          echo "✅ Frontend deployed!"
          echo "🌍 URL: http://app-translator-frontend-048408301771-eu-north-1-an.s3-website.eu-north-1.amazonaws.com"

  tagging:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=$(echo $LATEST_TAG | sed 's/v//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "⚠️ Tag ${{ steps.version.outputs.version }} already exists, skipping."
          else
            git tag ${{ steps.version.outputs.version }}
            git push origin ${{ steps.version.outputs.version }}
            echo "✅ Tag ${{ steps.version.outputs.version }} created!"
          fi
