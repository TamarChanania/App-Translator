name: ci-frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: tamar746968/app-translator-frontend:${{ github.sha }}
          load: true

      - name: Test Docker image
        run: |
          docker run --rm -d --name frontend-test -p 8080:80 tamar746968/app-translator-frontend:${{ github.sha }}
          sleep 3
          curl -f http://localhost:8080 || exit 1
          docker stop frontend-test
          echo "Docker image works!"

  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            tamar746968/app-translator-frontend:latest
            tamar746968/app-translator-frontend:${{ github.sha }}

  tagging:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.push.result == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=$(echo $LATEST_TAG | sed 's/v//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "⚠️ Tag ${{ steps.version.outputs.version }} already exists, skipping."
          else
            git tag ${{ steps.version.outputs.version }}
            git push origin ${{ steps.version.outputs.version }}
            echo "✅ Tag ${{ steps.version.outputs.version }} created!"
          fi
