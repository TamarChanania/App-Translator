services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: translations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d translations"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/translations
      TRANSLATOR_URL: http://localhost:5000
    depends_on:
      db:
        condition: service_healthy
    
  backend-test:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/translations
      BACKEND_URL: http://backend:3001
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: npm test
